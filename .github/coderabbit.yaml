language: uk

reviews:
  tone: concise
  max_comments: 15

  instructions: |
    IMPORTANT:
    You MUST write ALL comments ONLY in Ukrainian language.
    DO NOT use English at all.
    Each comment MUST start with "UA:".

    Якщо ти пишеш не українською — це помилка.

    Будь максимально конкретним і не додавай зайвих коментарів.

    Ігноруй:
    - форматування
    - незначні стилістичні правки

    Фокус:
    - баги
    - продуктивність
    - архітектура

  categories:
    - correctness
    - performance
    - architecture
    - best_practices

  path_instructions:

    # =========================
    # 🎨 FRONTEND (client)
    # =========================
    - paths:
        - "client/**"
      instructions: |
        --- FRONTEND (React) ---

        Аналізуй тільки frontend код.

        Фокус:
        - ререндери
        - React hooks
        - структура компонентів
        - розділення логіки і UI

        REACT:
        - перевіряй useEffect (залежності, зайві виклики)
        - чи є зайві ререндери
        - чи потрібні useMemo/useCallback
        - чи немає heavy логіки в render
        - чи не створюються нові об'єкти/функції кожен рендер

        PERFORMANCE:
        - списки (key, memo)
        - оптимізація маркерів (map)
        - debounce/throttle де потрібно

        АРХІТЕКТУРА:
        - pages повинні бути thin layer
        - modules — бізнес логіка
        - components — композиція
        - ui — dumb компоненти

        Заборонено:
        - бізнес логіка в ui
        - великі компоненти без декомпозиції

        ASYNC:
        - loading / error стани
        - дублювання запитів
        - race conditions

        Якщо є проблема:
        - коротко поясни
        - скажи чому це проблема
        - дай конкретний приклад фіксу

    # =========================
    # ⚙️ BACKEND (server)
    # =========================
    - paths:
        - "server/**"
      instructions: |
        --- BACKEND (Node.js / Express) ---

        Аналізуй тільки backend код.

        Фокус:
        - безпека
        - стабільність
        - API дизайн
        - робота з БД

        SECURITY:
        - обов'язкова валідація input
        - не довіряй req.body / req.query
        - перевірка на NoSQL injection
        - відсутність витоку секретів

        API:
        - правильні HTTP статуси
        - консистентність JSON відповідей
        - REST best practices

        ERROR HANDLING:
        - try/catch
        - централізований error handler
        - сервер не повинен падати

        DATABASE (MongoDB):
        - чи немає зайвих запитів
        - чи оптимальні запити
        - уникнення важких операцій

        PERFORMANCE:
        - відсутність блокуючих операцій
        - ефективна обробка запитів

        Якщо знаходиш проблему:
        - поясни ризик
        - запропонуй конкретний фікс

    # =========================
    # 🎯 UI слой
    # =========================
    - paths:
        - "client/**/ui/**"
      instructions: |
        --- UI COMPONENTS ---

        Це dumb компоненти.

        Перевіряй:
        - відсутність бізнес-логіки
        - простоту
        - перевикористання

        НЕ давай зайвих зауважень.

    # =========================
    # 🧠 MODULES слой
    # =========================
    - paths:
        - "client/**/modules/**"
      instructions: |
        --- MODULES ---

        Це бізнес-логіка.

        Перевіряй:
        - правильність логіки
        - відсутність дублювання
        - чи можна винести в hooks/services
        - чистоту архітектури

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"

  grouping:
    enabled: true

  summary:
    enabled: true
    include_overview: true
    include_recommendations: true

  auto_review:
    enabled: true
    drafts: false