name: PR Build and Notify

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, closed]

jobs:
  build-test-and-notify:
    runs-on: ubuntu-latest

    env:
      # –Ґ–Њ–Ї–µ–љ–Є —В–∞ —Ц–і–µ–љ—В–Є—Д—Ц–Ї–∞—В–Њ—А–Є
      TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ---------------------------
      # 1пЄПвГ£ –Ъ–ї–Њ–љ—Г–≤–∞–љ–љ—П –Ї–Њ–і—Г
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        # –Т–Є–Ї–Њ—А–Є—Б—В–Њ–≤—Г—Ф—В—М—Б—П –і–ї—П —В–Њ–≥–Њ, —Й–Њ–± –Љ–∞—В–Є –і–Њ—Б—В—Г–њ –і–Њ —А–µ–њ–Њ–Ј–Є—В–Њ—А—Ц—О –≤ workflow

      # ---------------------------
      # 2пЄПвГ£ –Ю—Б–љ–Њ–≤–љ–Є–є –Ї—А–Њ–Ї: —Д–Њ—А–Љ—Г–≤–∞–љ–љ—П –њ–Њ–≤—Ц–і–Њ–Љ–ї–µ–љ–љ—П —Ц –≤—Ц–і–њ—А–∞–≤–Ї–∞ –≤ Telegram
      # ---------------------------
      - name: Build, test and notify
        run: |
          # ---------------------------
          # 2.1 –Ч–±–Є—А–∞—Ф–Љ–Њ –Ј–Љ—Ц–љ–љ—Ц –Ј GitHub event
          # ---------------------------
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE=${{ github.event.pull_request.title }}
          PR_BODY=${{ github.event.pull_request.body }}
          PR_USER=${{ github.event.pull_request.user.login }}
          PR_HEAD=${{ github.event.pull_request.head.ref }}
          PR_BASE=${{ github.event.pull_request.base.ref }}
          PR_ACTION=${{ github.event.action }}
          PR_MERGED=${{ github.event.pull_request.merged }}

          # ---------------------------
          # 2.2 –Х–Ї—А–∞–љ—Г–≤–∞–љ–љ—П HTML —Б–Є–Љ–≤–Њ–ї—Ц–≤ –і–ї—П Telegram
          # ---------------------------
          PR_TITLE_ESC=$(echo "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            DESC_TEXT="<b>–Ю–њ–Є—Б:</b> $PR_BODY_ESC"
          fi

          # ---------------------------
          # 2.3 –Ю—В—А–Є–Љ—Г—Ф–Љ–Њ —З–∞—Б –Њ—Б—В–∞–љ–љ—М–Њ–≥–Њ –Њ–љ–Њ–≤–ї–µ–љ–љ—П PR
          # ---------------------------
          UPDATED_AT=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | jq -r '.updated_at')
          UPDATED_TS=$(date -d "$UPDATED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF=$((NOW_TS - UPDATED_TS))

          if [ "$DIFF" -lt 60 ]; then
            LAST_UPDATE="–Љ–µ–љ—И–µ —Е–≤–Є–ї–Є–љ–Є —В–Њ–Љ—Г"
          elif [ "$DIFF" -lt 3600 ]; then
            MINUTES=$((DIFF / 60))
            LAST_UPDATE="$MINUTES —Е–≤–Є–ї–Є–љ —В–Њ–Љ—Г"
          elif [ "$DIFF" -lt 86400 ]; then
            HOURS=$((DIFF / 3600))
            LAST_UPDATE="$HOURS –≥–Њ–і–Є–љ —В–Њ–Љ—Г"
          else
            DAYS=$((DIFF / 86400))
            LAST_UPDATE="$DAYS –і–љ—Ц–≤ —В–Њ–Љ—Г"
          fi

          # ---------------------------
          # 2.4 –§–Њ—А–Љ—Г—Ф–Љ–Њ —Б—В–∞—В—Г—Б PR
          # ---------------------------
          if [[ "$PR_ACTION" == "closed" ]]; then
            if [[ "$PR_MERGED" == "true" ]]; then
              PR_STATUS="рЯЯҐ Merged"
            else
              PR_STATUS="рЯФі –Ч–∞–Ї—А–Є—В–Њ –±–µ–Ј merge"
            fi
          else
            PR_STATUS="рЯЯ° –Т–Є–Ї–Њ–љ—Г—Ф—В—М—Б—П"
          fi

          # ---------------------------
          # 2.5 –§–Њ—А–Љ—Г—Ф–Љ–Њ —В–µ–Ї—Б—В –њ–Њ–≤—Ц–і–Њ–Љ–ї–µ–љ–љ—П –і–ї—П Telegram
          # ---------------------------
          MESSAGE=$(printf "рЯФµ <b>Pull Request #$PR_NUMBER</b>\n\n<b>–Э–∞–Ј–≤–∞:</b> %s\n<b>–Р–≤—В–Њ—А:</b> %s\n<b>–У—Ц–ї–Ї–∞:</b> %s вЖТ %s\n\n<b>–°—В–∞—В—Г—Б:</b> %s\n<b>–Ю—Б—В–∞–љ–љ—Ф –Њ–љ–Њ–≤–ї–µ–љ–љ—П:</b> %s\n%s" \
            "$PR_TITLE_ESC" "$PR_USER" "$PR_HEAD" "$PR_BASE" "$PR_STATUS" "$LAST_UPDATE" "$DESC_TEXT")

          # ---------------------------
          # 2.6 –§–Њ—А–Љ—Г—Ф–Љ–Њ –Ї–љ–Њ–њ–Ї–Є Inline –і–ї—П Telegram
          # ---------------------------
          REPLY_MARKUP=$(printf '{"inline_keyboard": [[{"text": "–Т—Ц–і–Ї—А–Є—В–Є PR", "url": "https://github.com/%s/pull/%s"}, {"text": "–Т—Ц–і–Ї—А–Є—В–Є CI", "url": "https://github.com/%s/actions"}]]}' \
            "${{ github.repository }}" "$PR_NUMBER" "${{ github.repository }}")

          # ---------------------------
          # 2.7 –Ю—В—А–Є–Љ—Г—Ф–Љ–Њ comment_id –Ј message_id (–і–ї—П –љ–∞–і—Ц–є–љ–Њ–≥–Њ —А–µ–і–∞–≥—Г–≤–∞–љ–љ—П)
          # ---------------------------
          COMMENT_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            | jq -r '.[] | select(.body | startswith("tg-msg-id:")) | .id' | head -n1)

          # ---------------------------
          # 2.8 –ѓ–Ї—Й–Њ –Ї–Њ–Љ–µ–љ—В–∞—А —Ц—Б–љ—Г—Ф вЖТ —А–µ–і–∞–≥—Г—Ф–Љ–Њ –њ–Њ–≤—Ц–і–Њ–Љ–ї–µ–љ–љ—П
          # ---------------------------
          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
            # –Ю—В—А–Є–Љ—Г—Ф–Љ–Њ message_id –Ј –Ї–Њ–Љ–µ–љ—В–∞—А—П
            MESSAGE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              | jq -r '.body' | cut -d: -f2)

            # –†–µ–і–∞–≥—Г—Ф–Љ–Њ –њ–Њ–≤—Ц–і–Њ–Љ–ї–µ–љ–љ—П –≤ Telegram
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "message_id=$MESSAGE_ID" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$MESSAGE" \
              --data-urlencode "reply_markup=$REPLY_MARKUP"

          # ---------------------------
          # 2.9 –Ж–љ–∞–Ї—И–µ вЖТ —Б—В–≤–Њ—А—О—Ф–Љ–Њ –љ–Њ–≤–µ –њ–Њ–≤—Ц–і–Њ–Љ–ї–µ–љ–љ—П —Ц –Ї–Њ–Љ–µ–љ—В–∞—А
          # ---------------------------
          else
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$MESSAGE" \
              --data-urlencode "reply_markup=$REPLY_MARKUP")
            MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')

            # –°—В–≤–Њ—А—О—Ф–Љ–Њ –Њ–Ї—А–µ–Љ–Є–є –Ї–Њ–Љ–µ–љ—В–∞—А –Ј message_id (–і–ї—П –љ–∞—Б—В—Г–њ–љ–Є—Е —А–µ–і–∞–≥—Г–≤–∞–љ—М)
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -d "{\"body\":\"tg-msg-id:$MESSAGE_ID\"}"
          fi