name: PR Build and Notify

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, closed]

jobs:
  pr-notify:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_USER: ${{ github.event.pull_request.user.login }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_ACTION: ${{ github.event.action }}
      PR_MERGED: ${{ github.event.pull_request.merged }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and send/update Telegram message
        run: |
          # --- Підготовка тексту PR ---
          PR_TITLE_ESC=$(echo "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            DESC_TEXT="<b>Опис:</b> $PR_BODY_ESC"
          fi

          # --- Отримуємо час останньої зміни PR ---
          UPDATED_AT=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | jq -r '.updated_at')
          UPDATED_TS=$(date -d "$UPDATED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF=$((NOW_TS - UPDATED_TS))
          if [ "$DIFF" -lt 60 ]; then
            LAST_UPDATE="менше хвилини тому"
          elif [ "$DIFF" -lt 3600 ]; then
            MINUTES=$((DIFF / 60))
            LAST_UPDATE="$MINUTES хвилин тому"
          elif [ "$DIFF" -lt 86400 ]; then
            HOURS=$((DIFF / 3600))
            LAST_UPDATE="$HOURS годин тому"
          else
            DAYS=$((DIFF / 86400))
            LAST_UPDATE="$DAYS днів тому"
          fi

          # --- Формуємо статус PR ---
          if [[ "$PR_ACTION" == "closed" ]]; then
            if [[ "$PR_MERGED" == "true" ]]; then
              PR_STATUS="🟢 Merged"
            else
              PR_STATUS="🔴 Closed without merge"
            fi
          else
            PR_STATUS="🟡 Running"
          fi

          MESSAGE=$(printf "🔵 <b>Pull Request #$PR_NUMBER</b>\n\n<b>Title:</b> %s\n<b>Author:</b> %s\n<b>Branch:</b> %s → %s\n\n<b>Status:</b> %s\n<b>Last update:</b> %s\n%s" "$PR_TITLE_ESC" "$PR_USER" "$PR_HEAD" "$PR_BASE" "$PR_STATUS" "$LAST_UPDATE" "$DESC_TEXT")

          REPLY_MARKUP=$(printf '{"inline_keyboard": [[{"text": "Open PR", "url": "https://github.com/%s/pull/%s"}, {"text": "Open CI", "url": "https://github.com/%s/actions"}]]}' "${{ github.repository }}" "$PR_NUMBER" "${{ github.repository }}")

          # --- Отримуємо MESSAGE_ID з коментаря (retry loop) ---
          MESSAGE_ID=""
          for i in {1..10}; do
            MESSAGE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              | jq -r '.[] | select(.body | startswith("tg-msg-id:")) | .body' | head -n1 | cut -d: -f2)

            if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
              break
            fi
            sleep 3
          done

          # --- Якщо MESSAGE_ID не знайдено і це opened, створюємо повідомлення ---
          if [[ -z "$MESSAGE_ID" || "$MESSAGE_ID" == "null" ]]; then
            if [[ "$PR_ACTION" == "opened" ]]; then
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
                --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
                --data-urlencode "parse_mode=HTML" \
                --data-urlencode "text=$MESSAGE" \
                --data-urlencode "reply_markup=$REPLY_MARKUP")

              MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')

              # --- Зберігаємо message_id в коментарі PR ---
              curl -s -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                -d "{\"body\":\"tg-msg-id:$MESSAGE_ID\"}"
            else
              echo "MESSAGE_ID не знайдено, вихід"
              exit 1
            fi
          else
            # --- Редагуємо існуюче повідомлення ---
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "message_id=$MESSAGE_ID" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$MESSAGE" \
              --data-urlencode "reply_markup=$REPLY_MARKUP"
          fi