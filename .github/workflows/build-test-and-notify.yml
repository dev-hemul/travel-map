name: PR Build and Notify

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, closed]

jobs:
  validate:
    name: build-and-test
    runs-on: ubuntu-latest

    env:
      ADMIN_ID: ${{ secrets.ADMIN_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      DB_URL: ${{ secrets.DB_URL }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      PORT: ${{ secrets.PORT }}
      PRIVATE_KEY_B64: ${{ secrets.PRIVATE_KEY_B64 }}
      PUBLIC_KEY_B64: ${{ secrets.PUBLIC_KEY_B64 }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack and PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            client/pnpm-lock.yaml
            server/pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install and Build Backend
        run: |
          cd server
          pnpm install --frozen-lockfile

      - name: Install and Build Frontend
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run Lint
        run: pnpm lint

      - name: Create .env for server
        run: |
          cat <<EOF > server/.env
          ADMIN_ID=${{ secrets.ADMIN_ID }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          DB_URL=${{ secrets.DB_URL }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          PORT=${{ secrets.PORT }}
          REFRESH_SECRET=${{ secrets.REFRESH_SECRET }}
          EOF

      - name: Create PEM key files
        run: |
          echo "${{ secrets.PRIVATE_KEY_B64 }}" | base64 -d > server/privateKey.pem
          echo "${{ secrets.PUBLIC_KEY_B64 }}" | base64 -d > server/publicKey.pem

  notify:
    needs: validate
    if: always() && (needs.validate.result == 'success' || github.event.action == 'closed')
    runs-on: ubuntu-latest

    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_USER: ${{ github.event.pull_request.user.login }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_MERGED: ${{ github.event.pull_request.merged }}
      PR_ACTION: ${{ github.event.action }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 🔵 Notify PR opened/reopened
        if: ${{ env.PR_ACTION == 'opened' || env.PR_ACTION == 'reopened' || env.PR_ACTION == 'synchronize' }}
        run: |
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            # Экранируем HTML
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            DESC_TEXT="<b>Опис:</b> $PR_BODY_ESC"
          fi

          PR_TITLE_ESC=$(echo "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          MESSAGE=$(cat <<EOF
          🔵 <b>Новий Pull Request від $PR_USER</b>

          <b>Назва:</b> $PR_TITLE_ESC
          <b>Гілка:</b> $PR_HEAD → $PR_BASE
          $DESC_TEXT

          🔗 <a href="https://github.com/${{ github.repository }}/pull/$PR_NUMBER">Дивитись PR</a>
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=$MESSAGE"

      - name: 🟢 Notify PR merged
        if: ${{ env.PR_MERGED == 'true' }}
        run: |
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            DESC_TEXT="<b>Опис:</b> $PR_BODY_ESC"
          fi

          MESSAGE=$(cat <<EOF
          🟢 <b>Pull Request #$PR_NUMBER був злитий в гілку $PR_BASE</b>

          Автор: $PR_USER
          $DESC_TEXT

          🔗 <a href="https://github.com/${{ github.repository }}/pull/$PR_NUMBER">Дивитись PR</a>

          👉 Не забудьте зробити <code>git pull</code>!
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=$MESSAGE"

      - name: 🔴 Notify PR closed without merge
        if: ${{ env.PR_ACTION == 'closed' && env.PR_MERGED != 'true' }}
        run: |
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            DESC_TEXT="<b>Опис:</b> $PR_BODY_ESC"
          fi

          MESSAGE=$(cat <<EOF
          🔴 <b>Pull Request #$PR_NUMBER був закритий без merge</b>

          Автор закритого PR: <b>$PR_USER</b>
          $DESC_TEXT

          🔗 <a href="https://github.com/${{ github.repository }}/pull/$PR_NUMBER">Дивитись PR</a>
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=$MESSAGE"
