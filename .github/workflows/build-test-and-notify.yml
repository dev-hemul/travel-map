name: PR Build and Notify

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, closed]

jobs:
  build-test-and-notify:
    runs-on: ubuntu-latest

    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_USER: ${{ github.event.pull_request.user.login }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_ACTION: ${{ github.event.action }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build, test and notify
        run: |
          # --- Підготовка тексту PR ---
          PR_TITLE_ESC=$(echo "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          DESC_TEXT=""
          if [ -n "$PR_BODY" ]; then
            PR_BODY_ESC=$(echo "$PR_BODY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            # Обмежуємо довжину опису для Telegram
            if [ ${#PR_BODY_ESC} -gt 200 ]; then
              PR_BODY_ESC="${PR_BODY_ESC:0:200}..."
            fi
            DESC_TEXT="<b>Опис:</b> $PR_BODY_ESC"
          fi

          # --- Отримуємо час останньої зміни PR ---
          UPDATED_AT=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | jq -r '.updated_at')

          UPDATED_TS=$(date -d "$UPDATED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF=$((NOW_TS - UPDATED_TS))

          if [ "$DIFF" -lt 60 ]; then
            LAST_UPDATE="менше хвилини тому"
          elif [ "$DIFF" -lt 3600 ]; then
            MINUTES=$((DIFF / 60))
            LAST_UPDATE="$MINUTES хвилин тому"
          elif [ "$DIFF" -lt 86400 ]; then
            HOURS=$((DIFF / 3600))
            LAST_UPDATE="$HOURS годин тому"
          else
            DAYS=$((DIFF / 86400))
            LAST_UPDATE="$DAYS днів тому"
          fi

          # ---------------------------
          # 1️⃣ Отримуємо MESSAGE_ID з коментаря на PR
          # ---------------------------
          # Шукаємо коментар, що починається з "tg-msg-id:"
          COMMENT_RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments")
          
          # Знаходимо коментар з tg-msg-id
          MESSAGE_ID=$(echo "$COMMENT_RESPONSE" | jq -r '.[] | select(.body | startswith("tg-msg-id:")) | .body' | head -n1 | cut -d: -f2)
          
          # Також зберігаємо ID коментаря для можливого видалення дублікатів
          COMMENT_ID=$(echo "$COMMENT_RESPONSE" | jq -r '.[] | select(.body | startswith("tg-msg-id:")) | .id' | head -n1)

          # Видаляємо старі коментарі з tg-msg-id (залишаємо тільки останній)
          COMMENT_IDS=$(echo "$COMMENT_RESPONSE" | jq -r '.[] | select(.body | startswith("tg-msg-id:")) | .id' | tail -n +2)
          for old_comment_id in $COMMENT_IDS; do
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/$old_comment_id"
          done

          # ---------------------------
          # 2️⃣ Перевіряємо статус PR через GitHub API
          # ---------------------------
          PR_INFO=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")
          PR_MERGED=$(echo "$PR_INFO" | jq -r '.merged')
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state')

          # ---------------------------
          # 3️⃣ Формуємо статус PR
          # ---------------------------
          if [[ "$PR_STATE" == "closed" ]]; then
            if [[ "$PR_MERGED" == "true" ]]; then
              PR_STATUS="🟢 Merged"
            else
              PR_STATUS="🔴 Closed without merge"
            fi
          else
            PR_STATUS="🟡 Open"
          fi

          # Додаємо інформацію про дію для контексту
          ACTION_EMOJI=""
          case "$PR_ACTION" in
            "opened") ACTION_EMOJI="🆕 " ;;
            "reopened") ACTION_EMOJI="🔄 " ;;
            "closed") ACTION_EMOJI="✅ " ;;
            "synchronize") ACTION_EMOJI="📝 " ;;
            "edited") ACTION_EMOJI="✏️ " ;;
          esac

          # ---------------------------
          # 4️⃣ Формуємо повідомлення
          # ---------------------------
          MESSAGE=$(printf "%s🔵 <b>Pull Request #$PR_NUMBER</b>\n\n<b>Title:</b> %s\n<b>Author:</b> %s\n<b>Branch:</b> %s → %s\n\n<b>Status:</b> %s\n<b>Last update:</b> %s\n%s" \
            "$ACTION_EMOJI" "$PR_TITLE_ESC" "$PR_USER" "$PR_HEAD" "$PR_BASE" "$PR_STATUS" "$LAST_UPDATE" "$DESC_TEXT")

          REPLY_MARKUP=$(printf '{"inline_keyboard": [[{"text": "Open PR", "url": "https://github.com/%s/pull/%s"}, {"text": "Open CI", "url": "https://github.com/%s/actions"}]]}' \
            "${{ github.repository }}" "$PR_NUMBER" "${{ github.repository }}")

          # ---------------------------
          # 5️⃣ Редагуємо або створюємо повідомлення
          # ---------------------------
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            # Редагуємо існуюче повідомлення
            echo "Редагуємо повідомлення з ID: $MESSAGE_ID"
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "message_id=$MESSAGE_ID" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$MESSAGE" \
              --data-urlencode "reply_markup=$REPLY_MARKUP" || {
                # Якщо редагування не вдалося (наприклад, повідомлення видалено), створюємо нове
                echo "Помилка редагування, створюємо нове повідомлення"
                RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
                  --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
                  --data-urlencode "parse_mode=HTML" \
                  --data-urlencode "text=$MESSAGE" \
                  --data-urlencode "reply_markup=$REPLY_MARKUP")
                
                NEW_MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')
                
                # Оновлюємо коментар з новим ID
                if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
                  curl -s -X PATCH \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                    -d "{\"body\":\"tg-msg-id:$NEW_MESSAGE_ID\"}"
                else
                  curl -s -X POST \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                    -d "{\"body\":\"tg-msg-id:$NEW_MESSAGE_ID\"}"
                fi
              }
          else
            # Створюємо нове повідомлення
            echo "Створюємо нове повідомлення"
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$MESSAGE" \
              --data-urlencode "reply_markup=$REPLY_MARKUP")

            MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')

            # Зберігаємо MESSAGE_ID в коментар на PR
            if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
              curl -s -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                -d "{\"body\":\"tg-msg-id:$MESSAGE_ID\"}"
            fi
          fi