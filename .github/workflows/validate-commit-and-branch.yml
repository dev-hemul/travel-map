name: 🔍 Validate PR Format (branch, commits, description)

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  validate:
    name: Validate branch, commits, and PR description
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Потрібно, щоб бачити історію змін

      # ------------------------------
      # 1️⃣ Перевірка назви гілки
      # ------------------------------
      - name: 🪵 Check branch name format
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "🔍 Checking branch name: $BRANCH"

          # Формат: TM-999/short-description
          if [[ ! "$BRANCH" =~ ^TM-[0-9]+\/[a-z0-9._-]+$ ]]; then
            echo "❌ Некоректне ім'я гілки!"
            echo "✅ Формат повинен бути: TM-<номер задачі>/<короткий-опис>"
            echo "Приклад: TM-123/fix-auth-error"
            exit 1
          fi

          echo "✅ Branch name is valid!"

      # ------------------------------
      # 2️⃣ Перевірка комміт-повідомлень
      # ------------------------------
      - name: 🧾 Check commit messages
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          
          # Отримуємо список комітів
          COMMITS=$(git log --pretty=format:%s $BASE_SHA..$HEAD_SHA)

          echo "🔍 Перевіряємо коміти між $BASE_SHA і $HEAD_SHA"
          echo "-------------------------------------------"
          echo "$COMMITS"
          echo "-------------------------------------------"

          INVALID=0
          if [ -z "$COMMITS" ]; then
            echo "⚠️ Комітів для перевірки не знайдено (можливо, це merge PR або rebase)"
          else
            while IFS= read -r COMMIT || [[ -n "$COMMIT" ]]; do
              if [[ ! "$COMMIT" =~ ^TM-[0-9]+:\  ]]; then
                echo "❌ Некоректний коміт: \"$COMMIT\""
                echo "✅ Формат повинен бути: TM-<номер_задачі>: опис"
                echo "Приклад: TM-123: виправлена авторизація"
                INVALID=1
              else
                echo "✅ $COMMIT"
              fi
            done <<< "$COMMITS"
          fi

          if [ "$INVALID" -eq 1 ]; then
            echo "🚫 Знайдено некоректні коміти"
            exit 1
          fi

          echo "✅ Усі коміти коректні!"

      # ------------------------------
      # 3️⃣ Перевірка заголовку PR (формат + англійська мова)
      # ------------------------------
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "🔹 Заголовок PR: $TITLE"
          
          if [ -z "$TITLE" ]; then
            echo "❌ Заголовок PR пустий!"
            exit 1
          fi

          # Перевірка формату TM-123: текст
          if [[ ! "$TITLE" =~ ^TM-[0-9]+:\  ]]; then
            echo "❌ Заголовок PR має починатись з 'TM-число: ' (приклад: TM-129: Fix map loading error)" >&2
            exit 1
          fi

          # Видаляємо префікс TM-XXX: для перевірки тексту
          TITLE_TEXT=$(echo "$TITLE" | sed -E 's/^TM-[0-9]+:\ //')
          
          # Перевірка на наявність кирилиці (українські/російські літери)
          if [[ "$TITLE_TEXT" =~ [А-Яа-яЁёІіЇїЄєҐґ] ]]; then
            echo "❌ Заголовок PR містить кириличні символи (українські або російські літери)!"
            echo ""
            echo "📝 Знайдено: \"$TITLE_TEXT\""
            echo ""
            echo "✅ Заголовок має бути англійською мовою!"
            echo "✅ Дозволені символи:"
            echo "   - англійські літери (A-Z, a-z)"
            echo "   - цифри (0-9)"
            echo "   - пробіл"
            echo "   - . , ! ? - _ : / ( ) [ ] { }"
            echo ""
            echo "✅ Приклади правильних заголовків:"
            echo "   - TM-250: Add plus button to user profile"
            echo "   - TM-252: fix-bug"
            echo "   - TM-252: fix_bug"
            echo "   - TM-252: Fix bug in weather widget"
            echo ""
            echo "❌ Приклад неправильного: TM-250: Додати кнопку плюс"
            exit 1
          fi

          # Перевірка довжини (≤72 символів)
          LEN=${#TITLE}
          if [ "$LEN" -gt 72 ]; then
            echo "❌ Заголовок PR дуже довгий ($LEN символів, максимум 72)" >&2
            exit 1
          fi    

          echo "✅ Заголовок PR коректний! (англійська мова)"

      # ------------------------------
      # 4️⃣ Перевірка опису PR
      # ------------------------------
      - name: 📝 Check PR description format
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "🔍 Перевіряємо опис PR:"
          echo "$BODY"
          
          # Перевірка на пусте поле
          if [ -z "$BODY" ]; then
            echo "❌ Опис PR пустий!"
            exit 1
          fi

          # Формат: TM-999: опис задачі
          if [[ ! "$BODY" =~ ^TM-[0-9]+:\  ]]; then
            echo "❌ Некоректний опис PR!"
            echo "✅ Формат повинен бути: TM-<номер_задачі>: опис"
            echo "Приклад: TM-123: додано оновлення профілю користувача"
            exit 1
          fi
          
          DESCRIPTION=$(echo "$BODY" | sed -E 's/^TM-[0-9]+:\ //')
          
          # Перевірка на загальні слова
          if [[ "$DESCRIPTION" =~ ^(fix|update|wip|temp|test|change|edit|remove|add|delete|refactor|docs?)$ ]]; then
            echo "❌ Занадто загальний опис: \"$DESCRIPTION\""
            echo "✅ Опиши конкретно, що зроблено (наприклад: \"fix login button color\", \"add validation for email\")"
            exit 1
          fi

          echo "✅ Опис PR коректний!"